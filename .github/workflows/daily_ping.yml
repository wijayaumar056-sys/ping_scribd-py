name: Daily Scribd Indexing Ping

on:
  schedule:
    # Berjalan otomatis setiap jam 00:00 WITA (16:00 UTC)
    - cron: '0 16 * * *'
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest

    # Memberikan izin agar GitHub Actions bisa menulis/mengubah file di repositori Anda
    permissions:
      contents: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Install dependencies
      run: |
        pip install requests

    - name: Run Ping Script
      run: python ping_scribd.py

    # --- LANGKAH BARU DI BAWAH INI UNTUK MENYELAMATKAN URLS.TXT ---
    - name: Commit and Push changes
      run: |
        # Mengatur identitas otomatis agar Git tidak memunculkan eror "empty ident name"
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action Bot"
        
        # Mengecek apakah ada perubahan urutan di urls.txt
        git add urls.txt
        
        # Jika ada perubahan, simpan dan push balik ke repositori Anda
        git diff --quiet && git diff --staged --quiet || (git commit -m "🔄 Otomatisasi: Rotasi antrean 5 URL teratas ke bawah" && git push)
