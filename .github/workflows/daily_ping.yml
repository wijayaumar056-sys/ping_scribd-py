name: Daily Scribd Indexing Ping

on:
  schedule:
    # Berjalan otomatis setiap jam 00:00 WITA (16:00 UTC)
    - cron: '0 16 * * *'
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
      with:
        # Mengambil riwayat git secara penuh agar proses commit valid
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Install dependencies
      run: |
        pip install requests

    - name: Run Ping Script
      run: python ping_scribd.py

    # --- MENGGUNAKAN PLUGINS RESMI YANG DIJAMIN LOLOS PROTEKSI GIT ---
    - name: Commit & Push Changes Automatically
      uses: stefanzweifel/git-auto-commit-action@v4
      with:
        commit_message: "🔄 Otomatisasi: Rotasi antrean 5 URL teratas ke bawah"
        file_pattern: 'urls.txt'
